<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="sg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Book stack — back book -->
  <rect x="18" y="30" width="38" height="52" rx="3" ry="3"
        fill="url(#cg)" opacity="0.55" transform="rotate(-8 37 56)"/>

  <!-- Book stack — middle book -->
  <rect x="22" y="26" width="38" height="52" rx="3" ry="3"
        fill="url(#pg)" opacity="0.75" transform="rotate(-2 41 52)"/>

  <!-- Book stack — front book (main) -->
  <rect x="28" y="22" width="40" height="56" rx="3" ry="3"
        fill="url(#pg)"/>

  <!-- Spine shadow on front book -->
  <rect x="28" y="22" width="7" height="56" rx="3" ry="3"
        fill="#1a0040" opacity="0.45"/>
  <rect x="32" y="22" width="3" height="56"
        fill="#1a0040" opacity="0.2"/>

  <!-- Pages edge (right side) -->
  <rect x="66" y="24" width="3" height="52" rx="1"
        fill="#e2e8f0" opacity="0.15"/>

  <!-- Decorative lines on cover -->
  <line x1="38" y1="33" x2="64" y2="33" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="38" y1="37" x2="58" y2="37" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>

  <!-- Quantum orbit ring — horizontal ellipse -->
  <ellipse cx="50" cy="50" rx="44" ry="14"
           fill="none" stroke="url(#sg)" stroke-width="1.4" opacity="0.7"
           transform="rotate(-20 50 50)"/>

  <!-- Orbit ring 2 — tilted the other way -->
  <ellipse cx="50" cy="50" rx="44" ry="10"
           fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.35"
           transform="rotate(55 50 50)"/>

  <!-- Glowing nucleus dot -->
  <circle cx="50" cy="50" r="5" fill="#c084fc" filter="url(#glow)" opacity="0.9"/>
  <circle cx="50" cy="50" r="3" fill="white" opacity="0.95"/>

  <!-- Small electron dots on orbit -->
  <circle cx="18" cy="40" r="2.2" fill="#22d3ee" opacity="0.85"/>
  <circle cx="82" cy="60" r="1.8" fill="#a855f7" opacity="0.85"/>

  <!-- Star sparkles -->
  <circle cx="76" cy="24" r="1.4" fill="#c084fc" opacity="0.9"/>
  <circle cx="20" cy="72" r="1.2" fill="#60a5fa" opacity="0.8"/>
  <circle cx="84" cy="32" r="1" fill="#22d3ee" opacity="0.75"/>
</svg>
